name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run lint across all workspaces
        run: npm run lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check Prettier formatting
        run: npm run format:check

  # NOTE: typecheck + build jobs are omitted tonight because the
  # pre-existing @skyhub/types build is broken (missing .js extensions on
  # relative imports under moduleResolution: NodeNext). Fixing that is a
  # separate follow-up task — re-enable the jobs here once it is resolved.
